name: Data Extractor

on:
  schedule:
    # Run every 6 hours at minute 0
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install & Connect Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode proxy
          sudo warp-cli --accept-tos proxy port 40000
          sudo warp-cli --accept-tos connect
          echo "Waiting for WARP connection..."
          sleep 10
          curl -x ${{ secrets.APP_NETWORK_PROXY }} https://www.cloudflare.com/cdn-cgi/trace

      - name: Check IP
        run: curl --proxy ${{ secrets.APP_NETWORK_PROXY }} https://ipinfo.io/json

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Extractor (Docker)
        run: |
          docker run --rm --network host \
            -e APP_DATA_BASE_URL="${{ secrets.APP_DATA_BASE_URL }}" \
            -e APP_DATA_BASE_TOKEN="${{ secrets.APP_DATA_BASE_TOKEN }}" \
            -e HTTP_PROXY="${{ secrets.APP_NETWORK_PROXY }}" \
            -e HTTPS_PROXY="${{ secrets.APP_NETWORK_PROXY }}" \
            -e APP_NETWORK_PROXY="${{ secrets.APP_NETWORK_PROXY }}" \
            -e NO_PROXY="${{ secrets.OTEL_EXPORTER_DOMAIN }},localhost,127.0.0.1" \
            -e OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
            -e OTEL_EXPORTER_OTLP_ENDPOINT="${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}" \
            -e USER_AGENT="${{ secrets.USER_AGENT }}" \
            -e REDDIT_COOKIE="${{ secrets.REDDIT_COOKIE }}" \
            -e LOG_VISIBILITY="${{ secrets.LOG_VISIBILITY }}" \
            ${{ secrets.EXTRACTOR_IMAGE }}
