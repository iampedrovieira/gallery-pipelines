name: Data Extractor

on:
  schedule:
    # Run every 6 hours at minute 0
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Extractor (Docker)
        run: |
          docker run --rm --network host \
            -e APP_DATA_BASE_URL="${{ secrets.APP_DATA_BASE_URL }}" \
            -e APP_DATA_BASE_TOKEN="${{ secrets.APP_DATA_BASE_TOKEN }}" \
            -e OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
            -e OTEL_EXPORTER_OTLP_ENDPOINT="${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}" \
            -e USER_AGENT="${{ secrets.USER_AGENT }}" \
            -e REDDIT_COOKIE="${{ secrets.REDDIT_COOKIE }}" \
            -e LOG_VISIBILITY="${{ secrets.LOG_VISIBILITY }}" \
            ${{ secrets.EXTRACTOR_IMAGE }}